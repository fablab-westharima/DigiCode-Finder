name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
      release_upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          name: 'DigiCode Helper v${{ steps.get_version.outputs.VERSION }}'
          body: |
            DigiCode Helper の新しいバージョンがリリースされました。

            ## ダウンロード
            - **macOS (Intel)**: `DigiCode.Helper_macOS-Intel_*.dmg`
            - **macOS (Apple Silicon)**: `DigiCode.Helper_macOS-ARM_*.dmg`
            - **Windows**: `DigiCode.Helper_Windows_*.exe`
            - **Linux**: `DigiCode.Helper_Linux_*.AppImage`

            ## 自動更新
            アプリ内で自動的に更新通知が表示されます。
          draft: false
          prerelease: false

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: x86_64-apple-darwin
            os_name: macOS-Intel
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_name: macOS-ARM
          - platform: ubuntu-22.04
            target: ''
            os_name: Linux
          - platform: windows-latest
            target: ''
            os_name: Windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libavahi-compat-libdnssd-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # releaseIdを指定しないことで自動アップロードを無効化
          # カスタムスクリプトでOS名入りのファイル名でアップロードする
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

      - name: Get version
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename and upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          OS_NAME=${{ matrix.os_name }}
          mkdir -p /tmp/upload

          # Find and rename DMG files
          for file in src-tauri/target/*/release/bundle/dmg/*.dmg; do
            if [ -f "$file" ]; then
              newname="DigiCode.Helper_${OS_NAME}_${VERSION}.dmg"
              cp "$file" "/tmp/upload/${newname}"
              echo "Uploading ${newname}"
              gh release upload "v${VERSION}" "/tmp/upload/${newname}" --clobber || true
            fi
          done

          # Find and rename tar.gz files (for updater)
          for file in src-tauri/target/*/release/bundle/macos/*.tar.gz; do
            if [ -f "$file" ]; then
              newname="DigiCode.Helper_${OS_NAME}_${VERSION}.app.tar.gz"
              cp "$file" "/tmp/upload/${newname}"
              echo "Uploading ${newname}"
              gh release upload "v${VERSION}" "/tmp/upload/${newname}" --clobber || true
            fi
          done

          # Upload sig files for updater
          for file in src-tauri/target/*/release/bundle/macos/*.tar.gz.sig; do
            if [ -f "$file" ]; then
              newname="DigiCode.Helper_${OS_NAME}_${VERSION}.app.tar.gz.sig"
              cp "$file" "/tmp/upload/${newname}"
              echo "Uploading ${newname}"
              gh release upload "v${VERSION}" "/tmp/upload/${newname}" --clobber || true
            fi
          done

      - name: Rename and upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          OS_NAME=${{ matrix.os_name }}
          mkdir -p /tmp/upload

          # Find and upload exe files
          for file in src-tauri/target/release/bundle/nsis/*.exe; do
            if [ -f "$file" ]; then
              newname="DigiCode.Helper_${OS_NAME}_${VERSION}-setup.exe"
              cp "$file" "/tmp/upload/${newname}"
              echo "Uploading ${newname}"
              gh release upload "v${VERSION}" "/tmp/upload/${newname}" --clobber || true
            fi
          done

          # Find and upload nsis sig for updater
          for file in src-tauri/target/release/bundle/nsis/*.exe.sig; do
            if [ -f "$file" ]; then
              newname="DigiCode.Helper_${OS_NAME}_${VERSION}-setup.exe.sig"
              cp "$file" "/tmp/upload/${newname}"
              echo "Uploading ${newname}"
              gh release upload "v${VERSION}" "/tmp/upload/${newname}" --clobber || true
            fi
          done

          # Find and upload msi files
          for file in src-tauri/target/release/bundle/msi/*.msi; do
            if [ -f "$file" ]; then
              newname="DigiCode.Helper_${OS_NAME}_${VERSION}.msi"
              cp "$file" "/tmp/upload/${newname}"
              echo "Uploading ${newname}"
              gh release upload "v${VERSION}" "/tmp/upload/${newname}" --clobber || true
            fi
          done

      - name: Rename and upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          OS_NAME=${{ matrix.os_name }}
          mkdir -p /tmp/upload

          # Find and upload AppImage
          for file in src-tauri/target/release/bundle/appimage/*.AppImage; do
            if [ -f "$file" ]; then
              newname="DigiCode.Helper_${OS_NAME}_${VERSION}.AppImage"
              cp "$file" "/tmp/upload/${newname}"
              echo "Uploading ${newname}"
              gh release upload "v${VERSION}" "/tmp/upload/${newname}" --clobber || true
            fi
          done

          # Find and upload AppImage sig for updater
          for file in src-tauri/target/release/bundle/appimage/*.AppImage.sig; do
            if [ -f "$file" ]; then
              newname="DigiCode.Helper_${OS_NAME}_${VERSION}.AppImage.sig"
              cp "$file" "/tmp/upload/${newname}"
              echo "Uploading ${newname}"
              gh release upload "v${VERSION}" "/tmp/upload/${newname}" --clobber || true
            fi
          done

          # Find and upload deb
          for file in src-tauri/target/release/bundle/deb/*.deb; do
            if [ -f "$file" ]; then
              newname="DigiCode.Helper_${OS_NAME}_${VERSION}.deb"
              cp "$file" "/tmp/upload/${newname}"
              echo "Uploading ${newname}"
              gh release upload "v${VERSION}" "/tmp/upload/${newname}" --clobber || true
            fi
          done

          # Find and upload rpm
          for file in src-tauri/target/release/bundle/rpm/*.rpm; do
            if [ -f "$file" ]; then
              newname="DigiCode.Helper_${OS_NAME}_${VERSION}.rpm"
              cp "$file" "/tmp/upload/${newname}"
              echo "Uploading ${newname}"
              gh release upload "v${VERSION}" "/tmp/upload/${newname}" --clobber || true
            fi
          done

  upload-updater:
    needs: [create-release, build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          REPO="fablab-westharima/DigiCode-Helper"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          # Wait for all artifacts to be available
          sleep 30

          # Download signature files
          mkdir -p /tmp/sigs
          gh release download "v${VERSION}" -p "*.sig" -D /tmp/sigs || true

          # Read signatures
          DARWIN_X64_SIG=""
          DARWIN_ARM_SIG=""
          LINUX_SIG=""
          WINDOWS_SIG=""

          if [ -f "/tmp/sigs/DigiCode.Helper_macOS-Intel_${VERSION}.app.tar.gz.sig" ]; then
            DARWIN_X64_SIG=$(cat "/tmp/sigs/DigiCode.Helper_macOS-Intel_${VERSION}.app.tar.gz.sig")
          fi
          if [ -f "/tmp/sigs/DigiCode.Helper_macOS-ARM_${VERSION}.app.tar.gz.sig" ]; then
            DARWIN_ARM_SIG=$(cat "/tmp/sigs/DigiCode.Helper_macOS-ARM_${VERSION}.app.tar.gz.sig")
          fi
          if [ -f "/tmp/sigs/DigiCode.Helper_Linux_${VERSION}.AppImage.sig" ]; then
            LINUX_SIG=$(cat "/tmp/sigs/DigiCode.Helper_Linux_${VERSION}.AppImage.sig")
          fi
          if [ -f "/tmp/sigs/DigiCode.Helper_Windows_${VERSION}-setup.exe.sig" ]; then
            WINDOWS_SIG=$(cat "/tmp/sigs/DigiCode.Helper_Windows_${VERSION}-setup.exe.sig")
          fi

          # Generate latest.json
          cat > /tmp/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "DigiCode Helper v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-x86_64": {
                "url": "${BASE_URL}/DigiCode.Helper_macOS-Intel_${VERSION}.app.tar.gz",
                "signature": "${DARWIN_X64_SIG}"
              },
              "darwin-aarch64": {
                "url": "${BASE_URL}/DigiCode.Helper_macOS-ARM_${VERSION}.app.tar.gz",
                "signature": "${DARWIN_ARM_SIG}"
              },
              "linux-x86_64": {
                "url": "${BASE_URL}/DigiCode.Helper_Linux_${VERSION}.AppImage",
                "signature": "${LINUX_SIG}"
              },
              "windows-x86_64": {
                "url": "${BASE_URL}/DigiCode.Helper_Windows_${VERSION}-setup.exe",
                "signature": "${WINDOWS_SIG}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat /tmp/latest.json

          gh release upload "v${VERSION}" "/tmp/latest.json" --clobber
